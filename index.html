document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"fr\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Eridan · L'OS finance piloté par l'IA<\u002Ftitle>\n<style>/* ==========================================================================\n   Eridan Design System — Colors & Type\n   Source: 26-01-03-ALTAIR-SYNTHESE brand synthesis PDF (assets/brand-synthesis.pdf)\n   ========================================================================== */\n\n/* -- Fonts ---------------------------------------------------------------- */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"8e7dcdc5-6615-4225-aa4d-abb14938f3fb\") format('woff2');\n}\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c6eec391-3bb7-4961-9fb4-8ac9280fcf12\") format('woff2');\n}\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"abb59b39-3b2f-42fb-a6ec-139451cf6a45\") format('woff2');\n}\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e803538e-bd4d-4f63-aae9-51c8a7d2f276\") format('woff2');\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f978be82-e350-4763-8d80-6685c6ba2e14\") format('woff2');\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b6d8c34c-467d-4e7f-b808-9d6d421cbb79\") format('woff2');\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d6a416ee-ff33-4a77-8760-d4fb58e6c646\") format('woff2');\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"094ff69d-bf7f-414f-bca1-30ca9f702afb\") format('woff2');\n}\n\n/* -- Tokens --------------------------------------------------------------- */\n:root {\n  /* Core brand palette (from brand synthesis PDF) */\n  --eridan-navy:      #002896;  /* Primary brand — wordmark */\n  --eridan-blue:      #197dbe;  /* Secondary blue */\n  --eridan-violet:    #9655ff;  /* Accent — AI / intelligence */\n  --eridan-cyan:      #3cfafa;  /* Accent — data / insight */\n  --eridan-pink:      #ff64e1;  /* Accent — highlight */\n  --eridan-green:     #2dbe82;  /* Semantic — positive / growth */\n  --eridan-orange:    #ff5a00;  /* Semantic — alert / energy */\n  --eridan-yellow:    #f5c323;  /* Semantic — attention */\n\n  /* Neutrals */\n  --eridan-slate:     #8093cb;  /* Muted slate-blue */\n  --eridan-mist:      #d4dbed;  /* Subtle blue-tinted surface */\n  --white:            #ffffff;\n  --black:            #000000;\n\n  /* Extended tints (selected steps from the 10%–100% scales in the brand doc) */\n  --navy-10:  #e6eaf4; --navy-20: #ccd4ea; --navy-40: #99a9d5; --navy-60: #667ebf; --navy-80: #3353aa; --navy-100: #002896;\n  --violet-10:#f4edff; --violet-20:#eaddff; --violet-40:#d5bbff; --violet-60:#bf99ff; --violet-80:#aa77ff; --violet-100:#9655ff;\n  --cyan-10:  #ebfefe; --cyan-20: #d8fdfd; --cyan-40: #b1fcfc; --cyan-60: #8afbfb; --cyan-80: #63fafa; --cyan-100: #3cfafa;\n  --blue-10:  #e8f2f9; --blue-20: #d1e5f2; --blue-40: #a3cbe5; --blue-60: #75b1d8; --blue-80: #4797cb; --blue-100: #197dbe;\n\n  /* Semantic foreground */\n  --fg-1:        #002896;   /* Primary text on light — navy */\n  --fg-2:        #3353aa;   /* Secondary text */\n  --fg-3:        #667ebf;   /* Tertiary / caption */\n  --fg-muted:    #8093cb;   /* Muted */\n  --fg-inverse:  #ffffff;   /* On dark / on navy surfaces */\n\n  /* Semantic background */\n  --bg-0:        #ffffff;   /* App base */\n  --bg-1:        #f6f8fd;   /* Subtle surface (navy-5, derived) */\n  --bg-2:        #eef2fa;   /* Panel */\n  --bg-3:        #d4dbed;   /* Mist — raised */\n  --bg-dark:     #002896;   /* Brand dark surface */\n  --bg-darker:   #001b6b;   /* Hover on brand dark */\n\n  /* Borders */\n  --border-subtle:  #e6eaf4;\n  --border-default: #d4dbed;\n  --border-strong:  #8093cb;\n  --border-focus:   #9655ff;\n\n  /* Semantic states */\n  --success: #2dbe82;\n  --success-bg: #e0f5ec;\n  --warning: #f5c323;\n  --warning-bg: #fdf6dc;\n  --danger:  #ff5a00;\n  --danger-bg: #ffe3d4;\n  --info:    #197dbe;\n  --info-bg: #e8f2f9;\n\n  /* Radii */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  /* Spacing (4px base) */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* Shadows — low, crisp. No heavy drop-shadows. */\n  --shadow-xs: 0 1px 2px rgba(0, 40, 150, 0.06);\n  --shadow-sm: 0 2px 4px rgba(0, 40, 150, 0.06), 0 1px 2px rgba(0, 40, 150, 0.04);\n  --shadow-md: 0 4px 12px rgba(0, 40, 150, 0.08), 0 2px 4px rgba(0, 40, 150, 0.04);\n  --shadow-lg: 0 12px 32px rgba(0, 40, 150, 0.10), 0 4px 8px rgba(0, 40, 150, 0.04);\n  --shadow-focus: 0 0 0 3px rgba(150, 85, 255, 0.25);\n\n  /* Typography families */\n  --font-display: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n  --font-body:    'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* Type scale */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   20px;\n  --text-xl:   24px;\n  --text-2xl:  32px;\n  --text-3xl:  44px;\n  --text-4xl:  60px;\n  --text-5xl:  80px;\n\n  /* Line-heights */\n  --lh-tight: 1.05;\n  --lh-snug:  1.2;\n  --lh-normal: 1.5;\n  --lh-relaxed: 1.7;\n\n  /* Motion */\n  --ease-out:      cubic-bezier(0.2, 0.7, 0.2, 1);\n  --ease-in-out:   cubic-bezier(0.5, 0, 0.2, 1);\n  --duration-fast: 120ms;\n  --duration-base: 200ms;\n  --duration-slow: 360ms;\n}\n\n/* -- Semantic element styles --------------------------------------------- */\nhtml, body {\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--lh-normal);\n  color: var(--fg-1);\n  background: var(--bg-0);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display headings use JetBrains Mono — a deliberate, technical, monospaced feel */\nh1, .h1 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-4xl);\n  line-height: var(--lh-tight);\n  letter-spacing: -0.02em;\n  color: var(--fg-1);\n  margin: 0;\n}\nh2, .h2 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-3xl);\n  line-height: var(--lh-tight);\n  letter-spacing: -0.015em;\n  color: var(--fg-1);\n  margin: 0;\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-2xl);\n  line-height: var(--lh-snug);\n  letter-spacing: -0.01em;\n  color: var(--fg-1);\n  margin: 0;\n}\nh4, .h4 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-xl);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n  margin: 0;\n}\n\n/* Body (Poppins) */\np, .body { font-family: var(--font-body); font-size: var(--text-base); line-height: var(--lh-normal); color: var(--fg-1); margin: 0; }\n.body-sm { font-family: var(--font-body); font-size: var(--text-sm); line-height: var(--lh-normal); color: var(--fg-2); }\n.body-xs { font-family: var(--font-body); font-size: var(--text-xs); line-height: 1.4; color: var(--fg-3); }\n\n/* Eyebrow / micro labels — mono, uppercase, tracked */\n.eyebrow {\n  font-family: var(--font-mono);\n  font-weight: 500;\n  font-size: var(--text-xs);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--fg-muted);\n}\n\n/* Code / tabular numbers */\ncode, .mono, .tabular {\n  font-family: var(--font-mono);\n  font-size: 0.95em;\n  font-variant-numeric: tabular-nums;\n}\n\n/* Links */\na { color: var(--eridan-violet); text-decoration: none; }\na:hover { color: var(--eridan-navy); text-decoration: underline; text-decoration-thickness: 1.5px; text-underline-offset: 3px; }\n\n\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  background: var(--bg-0);\n  color: var(--fg-1);\n  font-family: var(--font-body);\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n}\n\nimg { max-width: 100%; display: block; }\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; }\na { color: inherit; text-decoration: none; }\n\n/* ----- Layout ---------------------------------------------------------- */\n.wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }\n.wrap-wide { max-width: 1360px; margin: 0 auto; padding: 0 32px; }\n\n/* Density tweak */\nbody[data-density=\"dense\"] section { padding-top: 64px !important; padding-bottom: 64px !important; }\nbody[data-density=\"airy\"] section { padding-top: 128px !important; padding-bottom: 128px !important; }\n\n/* ----- Nav ------------------------------------------------------------- */\n.nav {\n  position: sticky; top: 0; z-index: 40;\n  background: rgba(255,255,255,0.72);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid transparent;\n  transition: border-color var(--duration-base) var(--ease-out), background var(--duration-base) var(--ease-out);\n}\n.nav.scrolled { border-bottom-color: var(--border-subtle); background: rgba(255,255,255,0.88); }\n.nav-inner { display: flex; align-items: center; gap: 32px; height: 68px; }\n.nav-brand { display: flex; align-items: center; gap: 10px; }\n.nav-brand img { height: 26px; }\n.nav-links { display: flex; gap: 28px; margin-left: 24px; }\n.nav-links a {\n  font-size: 14px; color: var(--fg-2); font-weight: 500;\n  transition: color var(--duration-fast) var(--ease-out);\n}\n.nav-links a:hover { color: var(--fg-1); }\n.nav-spacer { flex: 1; }\n.nav-right { display: flex; align-items: center; gap: 8px; }\n.nav-right a.login { font-size: 14px; font-weight: 500; padding: 8px 14px; color: var(--fg-2); }\n.nav-right a.login:hover { color: var(--fg-1); }\n\n/* ----- Buttons (EXACT from reference Eridan landing) ------------------- */\n.btn {\n  font-family: var(--font-body); font-weight: 600; font-size: 14px;\n  height: 44px; padding: 0 22px;\n  border: 1.5px solid #d4dbed;              /* grey mist border on every button */\n  border-radius: 0;\n  cursor: pointer;\n  transition: filter 150ms var(--ease-out), background-color 150ms var(--ease-out), border-color 150ms var(--ease-out);\n  display: inline-flex; align-items: center; gap: 8px;\n  line-height: 1; letter-spacing: 0.01em; white-space: nowrap;\n  background: var(--eridan-navy); color: #fff;   /* default = primary navy */\n}\n.btn:hover { filter: brightness(0.92); color: #fff; }\n.btn:active { filter: brightness(0.84); }\n.btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(150,85,255,0.30); }\n.btn-primary { background: var(--eridan-navy); color: #fff; }\n.btn-primary:hover { color: #fff; }\n.btn-ai { background: var(--eridan-violet); color: #fff; }\n.btn-ai:hover { color: #fff; }\n.btn-secondary { background: #fff; color: var(--eridan-navy); }\n.btn-secondary:hover { filter: none; background: var(--bg-2); color: var(--eridan-navy); }\n.btn-ghost { background: transparent; border-color: transparent; color: var(--fg-2); }\n.btn-ghost:hover { filter: none; background: var(--bg-2); color: var(--eridan-navy); }\n.btn-lg { height: 52px; padding: 0 28px; font-size: 16px; }\n.btn-sm { height: 36px; padding: 0 16px; font-size: 13px; }\n.btn .arrow { display: inline-block; transition: transform 160ms var(--ease-out); }\n.btn:hover .arrow { transform: translateX(3px); }\n\n/* On dark sections */\n.cta-final .btn-ghost, .on-dark .btn-ghost {\n  color: #fff; border-color: transparent;\n}\n.cta-final .btn-ghost:hover, .on-dark .btn-ghost:hover { background: rgba(255,255,255,0.08); }\n\n/* Crop-mark frame around CTAs (from reference) */\n.btn-frame {\n  --mark: #d4dbed; --arm: 18px; --over: 7px; --w: 1.5px;\n  position: relative; display: inline-block;\n  padding: var(--over);\n  vertical-align: middle;\n}\n.btn-frame > .btn { position: relative; z-index: 0; }\n.btn-frame .m { position: absolute; background: var(--mark); pointer-events: none; }\n.btn-frame .m.h { width: var(--arm); height: var(--w); }\n.btn-frame .m.v { width: var(--w); height: var(--arm); }\n.btn-frame .m.tl-h { top: var(--over); left: 0; }\n.btn-frame .m.tl-v { top: 0; left: var(--over); }\n.btn-frame .m.tr-h { top: var(--over); right: 0; }\n.btn-frame .m.tr-v { top: 0; right: var(--over); }\n.btn-frame .m.bl-h { bottom: var(--over); left: 0; }\n.btn-frame .m.bl-v { bottom: 0; left: var(--over); }\n.btn-frame .m.br-h { bottom: var(--over); right: 0; }\n.btn-frame .m.br-v { bottom: 0; right: var(--over); }\n.btn-frame.on-dark { --mark: rgba(255,255,255,0.45); }\n\n/* ----- Eyebrow / chips ------------------------------------------------- */\n.eyebrow {\n  font-family: var(--font-mono);\n  font-weight: 600;\n  font-size: 13px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--eridan-violet);\n  display: inline-flex; align-items: center; gap: 10px;\n}\n.eyebrow::before {\n  content: ''; width: 24px; height: 1.5px;\n  background: currentColor; flex: 0 0 auto;\n}\n.eyebrow .spark { width: 9px; height: 9px; }\n\n/* All section eyebrows: violet (brand signature colour) */\n.shift-head .eyebrow,\n.features-head .eyebrow,\n.cycle-head .eyebrow { color: var(--eridan-violet); font-size: 13px; }\n\n/* Feature-row eyebrows (01 / 02 / 03 modules): navy for readability */\n.feature-row .eyebrow { color: var(--eridan-navy); }\n.chip-mono {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 4px 10px; border: 1px solid var(--border-default);\n  border-radius: 999px; background: #fff;\n  font-family: var(--font-mono); font-size: 11px; font-weight: 500;\n  color: var(--fg-2); letter-spacing: 0.02em;\n}\n.chip-mono .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--eridan-violet); }\n\n/* ----- Hero ------------------------------------------------------------ */\n.hero { padding: 72px 0 96px; position: relative; overflow: hidden; }\n.hero-grid {\n  display: flex; flex-direction: column; gap: 56px; align-items: stretch;\n}\n.hero-left { padding-top: 0; max-width: 920px; }\n.hero-left .eyebrow { margin-bottom: 24px; }\n.hero-sub { max-width: 680px; }\n.hero-right { width: 100%; }\n.hero-app { min-height: 640px; }\n.hero h1 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 64px;\n  line-height: 0.98;\n  letter-spacing: -0.028em;\n  color: var(--fg-1);\n  margin: 0 0 24px;\n}\n.hero h1 .accent { color: var(--eridan-violet); }\n.hero h1 .line { display: block; }\n.hero-sub {\n  font-size: 19px; line-height: 1.55; color: var(--fg-2);\n  max-width: 520px; margin: 0 0 36px;\n}\n.hero-cta { display: flex; align-items: center; gap: 12px; }\n.hero-meta {\n  display: flex; gap: 24px; margin-top: 40px;\n  font-family: var(--font-mono); font-size: 12px; color: var(--fg-3);\n  letter-spacing: 0.02em;\n}\n.hero-meta .item { display: flex; align-items: center; gap: 8px; }\n.hero-meta .item .check {\n  width: 14px; height: 14px; color: var(--eridan-green);\n}\n\n/* Sparkles layer */\n.sparkle-layer { position: absolute; inset: 0; pointer-events: none; z-index: 0; }\n.sparkle-layer .sp {\n  position: absolute; width: 14px; height: 14px;\n  animation: sp-drift 8s ease-in-out infinite;\n}\n.sparkle-layer .sp.s1 { top: 10%; left: 6%; animation-delay: 0s; }\n.sparkle-layer .sp.s2 { top: 22%; left: 47%; width: 10px; height: 10px; animation-delay: 1.5s; }\n.sparkle-layer .sp.s3 { top: 78%; le ss=\"m h tl-h\"><\u002Fspan><span class=\"m v tl-v\"><\u002Fspan>\n                <span class=\"m h tr-h\"><\u002Fspan><span class=\"m v tr-v\"><\u002Fspan>\n                <span class=\"m h bl-h\"><\u002Fspan><span class=\"m v bl-v\"><\u002Fspan>\n                <span class=\"m h br-h\"><\u002Fspan><span class=\"m v br-v\"><\u002Fspan>\n                <div class=\"happ-stat-label\">CASH RUNWAY<\u002Fdiv>\n                <div class=\"happ-stat-val\">18 mo<\u002Fdiv>\n                <div class=\"happ-stat-delta up\">+2 mo<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"happ-stat solid\">\n                <span class=\"m h tl-h\"><\u002Fspan><span class=\"m v tl-v\"><\u002Fspan>\n                <span class=\"m h tr-h\"><\u002Fspan><span class=\"m v tr-v\"><\u002Fspan>\n                <span class=\"m h bl-h\"><\u002Fspan><span class=\"m v bl-v\"><\u002Fspan>\n                <span class=\"m h br-h\"><\u002Fspan><span class=\"m v br-v\"><\u002Fspan>\n                <div class=\"happ-stat-label\">CLOSE PROGRESS<\u002Fdiv>\n                <div class=\"happ-stat-val\">81%<\u002Fdiv>\n                <div class=\"happ-stat-bar\"><span style=\"width:81%\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Ask Argos slide-over panel -->\n        <aside class=\"happ-ai\" id=\"happ-ai\">\n          <div class=\"happ-ai-hd\">\n            <svg class=\"ai-spark\" width=\"16\" height=\"16\" viewBox=\"0 0 48 48\" fill=\"#9655ff\"><path d=\"M24 2 L28 20 L46 24 L28 28 L24 46 L20 28 L2 24 L20 20 Z\"><\u002Fpath><\u002Fsvg>\n            <span class=\"title\">Ask Argos<\u002Fspan>\n            <button class=\"happ-ai-close\" type=\"button\" aria-label=\"Close\" tabindex=\"-1\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"happ-ai-body\">\n            <div class=\"ai-msg user\" id=\"user-q\"><\u002Fdiv>\n            <div class=\"ai-msg bot\">\n              <div class=\"bot-text\" id=\"bot-a\"><\u002Fdiv>\n              <div class=\"ai-chip-row\" id=\"bot-chips\" style=\"display:none\">\n                <span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>Scénario · hire_2_ae_jan<\u002Fspan>\n                <span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>Drivers · headcount, ramp, CAC<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"ai-snippet\" id=\"bot-result\" style=\"display:none\">\n                <div class=\"hdr\">\n                  <span>Impact · baseline vs. scénario<\u002Fspan>\n                  <span class=\"src\">scénario · hire_2_ae_jan<\u002Fspan>\n                <\u002Fdiv>\n                <table>\n                  <thead><tr><th>Driver<\u002Fth><th class=\"num\">Baseline<\u002Fth><th class=\"num\">Scénario<\u002Fth><\u002Ftr><\u002Fthead>\n                  <tbody id=\"result-body\"><\u002Ftbody>\n                <\u002Ftable>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"happ-ai-input\">\n            <input class=\"input\" type=\"text\" placeholder=\"Ask anything about your data…\" id=\"demo-input-ph\">\n            <button class=\"btn btn-ai btn-icon\" aria-label=\"Send\" tabindex=\"-1\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ USED-BY LINE ============================ -->\n<section class=\"used-by\">\n  <div class=\"wrap\">\n    <p>Utilisé par des équipes finance en scale-up et ETI.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ STACK-FIT BADGE ============================ -->\n<section class=\"stack-fit\">\n  <div class=\"wrap\">\n    <div class=\"stack-fit-card\">\n      <span class=\"m h tl-h\"><\u002Fspan><span class=\"m v tl-v\"><\u002Fspan>\n      <span class=\"m h tr-h\"><\u002Fspan><span class=\"m v tr-v\"><\u002Fspan>\n      <span class=\"m h bl-h\"><\u002Fspan><span class=\"m v bl-v\"><\u002Fspan>\n      <span class=\"m h br-h\"><\u002Fspan><span class=\"m v br-v\"><\u002Fspan>\n      <svg class=\"plug\" viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M9 3v6M15 3v6M7 9h10v3a5 5 0 01-10 0V9zM12 17v4\"><\u002Fpath>\n      <\u002Fsvg>\n      <p><strong>Eridan se branche sur vos outils existants.<\u002Fstrong> <span>Pas de migration, pas de remplacement.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ SHIFT ============================ -->\n<section class=\"shift\" id=\"pour-qui\">\n  <div class=\"wrap\">\n    <div class=\"shift-head\">\n      <span class=\"eyebrow\">\n        <svg class=\"spark\" width=\"10\" height=\"10\"><use href=\"#spark\" fill=\"#002896\"><\u002Fuse><\u002Fsvg>\n        Le constat\n      <\u002Fspan>\n      <h2>Les équipes finance devraient piloter les décisions. Pas les préparer.<\u002Fh2>\n      <p>Dans beaucoup d'organisations, la finance passe l'essentiel de son temps à consolider des fichiers, pas à éclairer le comité de direction. Les questions qui comptent : <em>et si on recrute, et si on change de pricing, et si le churn monte de 2 points&nbsp;?<\u002Fem>, et attendent deux jours au lieu de dix minutes.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"shift-grid\">\n      <div class=\"shift-col before\">\n        <span class=\"tag\">Aujourd'hui<\u002Fspan>\n        <h3>80% du temps passé à préparer la donnée. 20% à la lire.<\u002Fh3>\n        <ul>\n          <li>Les drivers du business vivent dans des tableurs fragiles, mis à jour à la main.<\u002Fli>\n          <li>Chaque question de direction lance un chantier : extraire, recoller, vérifier, formater.<\u002Fli>\n          <li>Les scénarios « et si&nbsp;? » sont chers.<\u002Fli>\n          <li>La décision se prend avec un chiffre qui a déjà deux semaines.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"shift-col after\">\n        <span class=\"tag\">Avec Eridan<\u002Fspan>\n        <h3>Les drivers sont modélisés. Les scénarios sont à portée de question.<\u002Fh3>\n        <ul>\n          <li>Vos drivers (headcount, pricing, conversion, churn) sont des paramètres, pas des cellules cachées.<\u002Fli>\n          <li>Les scénarios se construisent en direct : on change un driver, tout l'impact se propage.<\u002Fli>\n          <li>Chaque chiffre est traçable de la source à la décision. Audit complet, bout en bout.<\u002Fli>\n          <li>La finance redevient partenaire stratégique : le « et alors&nbsp;? », pas le « où est la donnée&nbsp;? ».<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ FEATURES ============================ -->\n<section class=\"features\" id=\"produit\">\n  <div class=\"wrap-wide\">\n    <div class=\"features-head\">\n      <span class=\"eyebrow\">\n        <svg class=\"spark\"><use href=\"#spark\" fill=\"#9655ff\"><\u002Fuse><\u002Fsvg>\n        Le produit\n      <\u002Fspan>\n      <h2>Une plateforme pour modéliser. Trois surfaces pour décider.<\u002Fh2>\n      <p>Vos drivers, vos scénarios et vos chiffres vivent dans Eridan : isolés, versionnés, auditables. Vos équipes y accèdent là où elles pensent&nbsp;: dans l'app, dans Excel, ou via leur assistant IA.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Feature 1 : Argos -->\n    <div class=\"feature-row\">\n      <div class=\"feat-text violet\">\n        <span class=\"eyebrow\">\n          <svg class=\"spark\"><use href=\"#spark\" fill=\"#9655ff\"><\u002Fuse><\u002Fsvg>\n          01 · Argos\n        <\u002Fspan>\n        <h3>Un copilote qui accompagne la décision, pas qui la remplace.<\u002Fh3>\n        <p>Argos est intégré à chaque écran d'Eridan. Il connaît votre modèle, vos drivers et le scénario actif. Il propose des pistes. Vous gardez la main.<\u002Fp>\n        <ul>\n          <li>Teste des scénarios what‑if en langage naturel : recrutement, pricing, churn.<\u002Fli>\n          <li>Pré‑remplit les formules et les vues. Vous validez et ajustez à la marge.<\u002Fli>\n          <li>Explique chaque résultat et cite ses sources, ligne par ligne.<\u002Fli>\n          <li>N'invente aucun chiffre. Si la donnée n'existe pas, il le dit.<\u002Fli>\n        <\u002Ful>\n        <a class=\"learn\" href=\"#\">Explorer Argos<span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"feat-visual\">\n        <div class=\"argos-chat-wrap\">\n          <aside class=\"happ-ai argos-chat\">\n            <div class=\"happ-ai-hd\">\n              <svg class=\"ai-spark\" width=\"16\" height=\"16\" viewBox=\"0 0 48 48\" fill=\"#9655ff\"><path d=\"M24 2 L28 20 L46 24 L28 28 L24 46 L20 28 L2 24 L20 20 Z\"><\u002Fpath><\u002Fsvg>\n              <span class=\"title\">Ask Argos<\u002Fspan>\n              <span class=\"happ-ai-ctx\">Vue active · Revenue by region<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"happ-ai-body\">\n              <div class=\"ai-msg user\">Pourquoi la marge UK a chuté ce mois‑ci&nbsp;?<\u002Fdiv>\n              <div class=\"ai-msg bot\">\n                <div class=\"bot-text\">Deux effets cumulés : +2 contrats signés à -8% de marge en novembre (mix défavorable), et l'évolution GBP/EUR pour 0,6pt sur 2,3pt de baisse totale.<\u002Fdiv>\n                <div class=\"ai-chip-row\">\n                  <span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>2 contrats · nov‑26<\u002Fspan>\n                  <span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>FX · GBP/EUR −1,8%<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ai-msg user\">Si on recrute 2 AE en janvier, quel impact sur le runway&nbsp;?<\u002Fdiv>\n              <div class=\"ai-msg bot\">\n                <div class=\"bot-text\">Runway passe de 18 à 15 mois. Le break‑even glisse d'un trimestre (Q3 → Q4 2027). Si la ramp tient 80% du plan à M+6, l'ARR de sortie 2027 gagne €640k.<\u002Fdiv>\n                <div class=\"ai-snippet\">\n                  <div class=\"hdr\"><span>scénario · hire_2_ae_jan<\u002Fspan><span class=\"src\">3 drivers impactés<\u002Fspan><\u002Fdiv>\n                  <table>\n                    <thead><tr><th>Métrique<\u002Fth><th class=\"num\">Baseline<\u002Fth><th class=\"num\">Scénario<\u002Fth><\u002Ftr><\u002Fthead>\n                    <tbody>\n                      <tr><td class=\"primary\">Runway<\u002Ftd><td class=\"num\">18 mo<\u002Ftd><td class=\"num\">15 mo <span class=\"delta down\">−3<\u002Fspan><\u002Ftd><\u002Ftr>\n                      <tr><td class=\"primary\">Break‑even<\u002Ftd><td class=\"num\">Q3 27<\u002Ftd><td class=\"num\">Q4 27<\u002Ftd><\u002Ftr>\n                      <tr><td class=\"primary\">ARR sortie 27<\u002Ftd><td class=\"num\">€4,8M<\u002Ftd><td class=\"num\">€5,44M <span class=\"delta up\">+640k<\u002Fspan><\u002Ftd><\u002Ftr>\n                    <\u002Ftbody>\n                  <\u002Ftable>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ai-msg user\">Et si on décale à mars&nbsp;?<\u002Fdiv>\n              <div class=\"ai-msg bot\">\n                <div class=\"bot-text\">Runway remonte à 16,5 mois. ARR 2027 : +€480k (vs. +€640k en janvier). Je sauvegarde comme scénario comparatif&nbsp;?<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"ai-msg user\">Et si on augmente nos prix de 5% en mars&nbsp;?<\u002Fdiv>\n              <div class=\"ai-msg bot\">\n                <div class=\"bot-text\">Avec l'élasticité observée (−0,4 sur conversion, +0,3pt de churn), ARR 12 mois +€210k et marge brute +1,2pt. Le risque est concentré sur les 14 renouvellements Q2. Je peux isoler le sous-scénario «&nbsp;grands comptes uniquement&nbsp;»&nbsp;?<\u002Fdiv>\n                <div class=\"ai-chip-row\">\n                  <span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>Scénario · pricing_+5_mar<\u002Fspan>\n                  <span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>Drivers · ARPU, churn, conversion<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"happ-ai-input\">\n              <input class=\"input\" type=\"text\" placeholder=\"Poser une question à Argos…\" tabindex=\"-1\">\n              <button class=\"btn btn-ai btn-icon\" aria-label=\"Send\" tabindex=\"-1\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Faside>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n        <!-- Feature 2 : Excel Add-in -->\n    <div class=\"feature-row reverse\">\n      <div class=\"feat-text navy\">\n        <span class=\"eyebrow\">\n          <svg class=\"spark\"><use href=\"#spark\" fill=\"#002896\"><\u002Fuse><\u002Fsvg>\n          02 · Add‑in Excel\n        <\u002Fspan>\n        <h3>Vos données Eridan, directement dans vos cellules.<\u002Fh3>\n        <p>Plus de copier-coller. L'add‑in Microsoft Excel branche vos vues, datasets et scénarios à des cellules vivantes. Vos templates de P&amp;L, bilan, cash flow se rafraîchissent au clic, avec les droits d'accès respectés par utilisateur.<\u002Fp>\n        <ul>\n          <li>9 fonctions natives, disponibles comme n'importe quelle formule Excel : <span class=\"fn-list\"><code>=ERIDAN.VIEW()<\u002Fcode> <code>=ERIDAN.SCENARIO()<\u002Fcode> <code>=ERIDAN.SUM()<\u002Fcode>…<\u002Fspan><\u002Fli>\n          <li>Flux <code class=\"ic\">STREAM_VIEW<\u002Fcode> qui se rafraîchit en temps réel.<\u002Fli>\n          <li>Templates pré‑remplis : P&amp;L mensuel, bilan, cash flow, balance de vérification.<\u002Fli>\n          <li>Collaboration multi‑utilisateurs, droits d'accès hérités de la plateforme.<\u002Fli>\n        <\u002Ful>\n        <a class=\"learn\" href=\"#\">Installer l'add‑in<span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"feat-visual excel-mock\">\n        <div class=\"excel-ribbon\">\n          <span class=\"tab\">Fichier<\u002Fspan>\n          <span class=\"tab\">Accueil<\u002Fspan>\n          <span class=\"tab\">Insertion<\u002Fspan>\n          <span class=\"tab\">Formules<\u002Fspan>\n          <span class=\"tab\">Données<\u002Fspan>\n          <span class=\"eridan-tab\">\n            <svg width=\"10\" height=\"10\" viewBox=\"0 0 48 48\" fill=\"#9655ff\"><path d=\"M24 2 L28 20 L46 24 L28 28 L24 46 L20 28 L2 24 L20 20 Z\"><\u002Fpath><\u002Fsvg>\n            Eridan\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"excel-formula\">\n          <span class=\"ref\">B4<\u002Fspan>\n          <span class=\"fx\">ƒx<\u002Fspan>\n          <span class=\"val\">=ERIDAN.VIEW<span style=\"color:var(--fg-muted)\">(<\u002Fspan><span class=\"args\">\"revenue_by_region\"<\u002Fspan>, <span class=\"args\">$month=\"2026-12\"<\u002Fspan><span style=\"color:var(--fg-muted)\">)<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"excel-grid\">\n          <div class=\"row hdr\">\n            <div class=\"cell\"><\u002Fdiv>\n            <div class=\"cell\">A<\u002Fdiv>\n            <div class=\"cell\">B<\u002Fdiv>\n            <div class=\"cell\">C<\u002Fdiv>\n            <div class=\"cell\">D<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn\">\n            <div class=\"cell\">1<\u002Fdiv>\n            <div class=\"cell\" style=\"color:var(--fg-1);font-weight:500\">Revenue by region · Déc 2026<\u002Fdiv>\n            <div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn\">\n            <div class=\"cell\">2<\u002Fdiv>\n            <div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn hdr\" style=\"background:#f0f4fb\">\n            <div class=\"cell\">3<\u002Fdiv>\n            <div class=\"cell\" style=\"color:var(--fg-2);font-weight:500\">Région<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--fg-2);font-weight:500\">MTD<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--fg-2);font-weight:500\">vs. M‑1<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--fg-2);font-weight:500\">Marge<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn spill active\">\n            <div class=\"cell\">4<\u002Fdiv>\n            <div class=\"cell\">France<\u002Fdiv>\n            <div class=\"cell num\">62,400<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--success)\">+8.1%<\u002Fdiv>\n            <div class=\"cell num\">41%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn spill\">\n            <div class=\"cell\">5<\u002Fdiv>\n            <div class=\"cell\">UK<\u002Fdiv>\n            <div class=\"cell num\">24,180<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--danger)\">−2.4%<\u002Fdiv>\n            <div class=\"cell num\">27%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn spill\">\n            <div class=\"cell\">6<\u002Fdiv>\n            <div class=\"cell\">DACH<\u002Fdiv>\n            <div class=\"cell num\">28,760<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--success)\">+14.2%<\u002Fdiv>\n            <div class=\"cell num\">38%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row rn spill\" style=\"position:relative\">\n            <div class=\"cell\">7<\u002Fdiv>\n            <div class=\"cell\">Bénélux<\u002Fdiv>\n            <div class=\"cell num\">13,000<\u002Fdiv>\n            <div class=\"cell num\" style=\"color:var(--success)\">+3.0%<\u002Fdiv>\n            <div class=\"cell num\">36%<\u002Fdiv>\n            <span class=\"excel-spill-marker\">↓ SPILL<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"row rn\">\n            <div class=\"cell\">8<\u002Fdiv>\n            <div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv><div class=\"cell\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Feature 3 : MCP -->\n    <div class=\"feature-row\">\n      <div class=\"feat-text cyan\">\n        <span class=\"eyebrow\">\n          <svg class=\"spark\"><use href=\"#spark\" fill=\"#197dbe\"><\u002Fuse><\u002Fsvg>\n          03 · Connecté à vos assistants IA\n        <\u002Fspan>\n        <h3>Posez vos questions à Claude, ChatGPT ou Cursor : ils lisent vos données Eridan en direct.<\u002Fh3>\n        <p>Votre assistant IA devient une surface d'analyse légitime pour votre équipe. Il interroge Eridan dans votre langage, avec vos droits, sans jamais sortir vos données du périmètre.<\u002Fp>\n        <ul>\n          <li>Votre assistant IA accède à vos données finance en lecture seule.<\u002Fli>\n          <li>Il respecte les mêmes droits d'accès que dans l'app, utilisateur par utilisateur.<\u002Fli>\n          <li>Posez une question en langage naturel, obtenez une réponse chiffrée et sourcée.<\u002Fli>\n          <li>Aucune donnée ne sort, aucune écriture possible.<\u002Fli>\n        <\u002Ful>\n        <a class=\"learn\" href=\"#\">En savoir plus<span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"feat-visual\">\n        <div class=\"claude-mock\">\n          <!-- window chrome -->\n          <div class=\"claude-chrome\">\n            <div class=\"claude-dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n            <div class=\"claude-title\">Claude<\u002Fdiv>\n            <div class=\"claude-model\">\n              <span class=\"ring\"><\u002Fspan>Sonnet 4.5\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"claude-body\">\n            <!-- user turn -->\n            <div class=\"claude-turn user\">\n              <div class=\"claude-avatar user\">AM<\u002Fdiv>\n              <div class=\"claude-bubble\">\n                Quelle région a porté la croissance d'Eridan en décembre, et de combien&nbsp;?\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- assistant turn -->\n            <div class=\"claude-turn bot\">\n              <div class=\"claude-avatar bot\">\n                <svg viewBox=\"0 0 48 48\" width=\"14\" height=\"14\" fill=\"#d97757\"><path d=\"M24 2 L28 20 L46 24 L28 28 L24 46 L20 28 L2 24 L20 20 Z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div class=\"claude-bubble bot\">\n                <p><strong>La France<\u002Fstrong> a porté la croissance en décembre&nbsp;: <strong>€62 400 MTD<\u002Fstrong>, soit <strong>+€4 100 vs novembre<\u002Fstrong> (41% de marge). La DACH suit avec +€3 200, puis le Bénélux à +€780. Seul le UK recule (−€1 840), affecté par le mix contrats et le FX GBP/EUR.<\u002Fp>\n                <p class=\"claude-meta\">via <span class=\"src\">eridan · run_view<\u002Fspan> · lecture seule · droits utilisateur appliqués<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- input (inert) -->\n          <div class=\"claude-input\">\n            <span class=\"claude-placeholder\">Écrire un message…<\u002Fspan>\n            <span class=\"claude-chip\"><span class=\"chip-dot\"><\u002Fspan>eridan MCP · connecté<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ CYCLE ============================ -->\n<section class=\"cycle\" id=\"cycle\">\n  <div class=\"wrap\">\n    <div class=\"cycle-head\">\n      <span class=\"eyebrow\">\n        <svg class=\"spark\"><use href=\"#spark\" fill=\"#002896\"><\u002Fuse><\u002Fsvg>\n        Le cycle\n      <\u002Fspan>\n      <h2>De la donnée brute à la décision, sans rupture.<\u002Fh2>\n      <p>Eridan structure vos données, modélise vos drivers, et laisse l\\u2019équipe finance tester n\\u2019importe quel scénario en direct : reproductible, traçable, partagé.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cycle-steps\">\n      <div class=\"cycle-step\">\n        <span class=\"num\">01 · IMPORT<\u002Fspan>\n        <h4>Connectez vos sources.<\u002Fh4>\n        <p>CSV, Excel, intégrations SaaS. Eridan détecte l'encodage, infère les types, isole chaque entreprise.<\u002Fp>\n        <div class=\"vis\">revenue.csv&nbsp;·&nbsp;<span class=\"highlight\">142k lignes<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cycle-step\">\n        <span class=\"num\">02 · MODÉLISER<\u002Fspan>\n        <h4>Exposez vos drivers.<\u002Fh4>\n        <p>Headcount, pricing, conversion, churn. Paramétrez la logique business, plus les cellules cachées.<\u002Fp>\n        <div class=\"vis\">$hires · $pricing<br><span class=\"highlight\">$churn = 5.8%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cycle-step\">\n        <span class=\"num\">03 · SIMULER<\u002Fspan>\n        <h4>Testez n'importe quel scénario.<\u002Fh4>\n        <p>Changez un driver, tout l\\u2019impact se propage. Comparez côte à côte, pinnez les scénarios retenus en comité.<\u002Fp>\n        <div class=\"vis\">baseline vs.<br><span class=\"highlight\">hire_2_ae_jan<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cycle-step\">\n        <span class=\"num\">04 · DIFFUSER<\u002Fspan>\n        <h4>Partout où vous pensez.<\u002Fh4>\n        <p>Dashboard Eridan, cellules Excel, assistants IA via MCP. Mêmes droits, mêmes chiffres, mêmes scénarios.<\u002Fp>\n        <div class=\"vis\">App · Excel · <span class=\"highlight\">MCP<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ CTA ============================ -->\n<section class=\"cta-final\" id=\"cta\">\n  <div class=\"sparkle-layer\" aria-hidden=\"true\">\n    <svg class=\"sp s1\"><use href=\"#spark\" fill=\"#f5c323\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s2\"><use href=\"#spark\" fill=\"#9655ff\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s3\"><use href=\"#spark\" fill=\"#3cfafa\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s4\"><use href=\"#spark\" fill=\"#002896\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s5\"><use href=\"#spark\" fill=\"#9655ff\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s6\"><use href=\"#spark\" fill=\"#f5c323\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s7\"><use href=\"#spark\" fill=\"#3cfafa\"><\u002Fuse><\u002Fsvg>\n    <svg class=\"sp s8\"><use href=\"#spark\" fill=\"#9655ff\"><\u002Fuse><\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"wrap\" style=\"position:relative;z-index:1\">\n    <h2>Prenez votre prochaine décision <span class=\"accent\">en 10 minutes,<\u002Fspan> pas en 2 jours.<\u002Fh2>\n    <p>30 minutes avec un membre de l\\u2019équipe Eridan. On regarde votre modèle, on identifie les drivers qui bougent vraiment, on vous montre le setup réel, sur vos chiffres.<\u002Fp>\n    <div class=\"cta-btns\">\n      <span class=\"btn-frame\">\n        <span class=\"m h tl-h\"><\u002Fspan><span class=\"m v tl-v\"><\u002Fspan>\n        <span class=\"m h tr-h\"><\u002Fspan><span class=\"m v tr-v\"><\u002Fspan>\n        <span class=\"m h bl-h\"><\u002Fspan><span class=\"m v bl-v\"><\u002Fspan>\n        <span class=\"m h br-h\"><\u002Fspan><span class=\"m v br-v\"><\u002Fspan>\n        <a class=\"btn btn-primary btn-lg\" href=\"#\">Demander une démo<span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <\u002Fspan>\n      <span class=\"btn-frame\">\n        <span class=\"m h tl-h\"><\u002Fspan><span class=\"m v tl-v\"><\u002Fspan>\n        <span class=\"m h tr-h\"><\u002Fspan><span class=\"m v tr-v\"><\u002Fspan>\n        <span class=\"m h bl-h\"><\u002Fspan><span class=\"m v bl-v\"><\u002Fspan>\n        <span class=\"m h br-h\"><\u002Fspan><span class=\"m v br-v\"><\u002Fspan>\n        <a class=\"btn btn-secondary btn-lg\" href=\"#\">Parler à l'équipe<\u002Fa>\n      <\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"small-note\">Réponse sous 24h · Cloud européen · SOC 2 en cours<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ FOOTER ============================ -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"footer-grid\">\n      <div class=\"footer-brand\">\n        <img src=\"def662f9-c99a-47fb-bc35-844fe05e9f0e\" alt=\"Eridan\">\n        <p>L'OS finance piloté par l'IA. Conçu pour les équipes qui ont besoin de rigueur, de traçabilité et de reproductibilité.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Produit<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">Argos<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Add‑in Excel<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Serveur MCP<\u002Fa><\u002Fli>\n          <li><a href=\"#\">File Mapper<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Tarifs<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Ressources<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">Documentation<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Changelog<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Statut<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Sécurité<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Entreprise<\u002Fh5>\n        <ul>\n          <li><a href=\"#\">À propos<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Carrières<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Contact<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Mentions légales<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-base\">\n      <div class=\"legal\">© 2026 Eridan Labs · Paris<\u002Fdiv>\n      <div class=\"locale\">\n        <span class=\"active\">FR<\u002Fspan>\n        <span>EN<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ============================ TWEAKS ============================ -->\n<div class=\"tweaks-panel\" id=\"tweaks\">\n  <h3 class=\"tw-title\">\n    <svg class=\"spark\"><use href=\"#spark\" fill=\"#9655ff\"><\u002Fuse><\u002Fsvg>\n    Tweaks\n  <\u002Fh3>\n  <div class=\"tw-group\">\n    <label class=\"tw-label\">Hero · angle<\u002Flabel>\n    <div class=\"tw-seg\" data-tweak=\"hero\">\n      <button data-val=\"promesse\">Promesse<\u002Fbutton>\n      <button data-val=\"probleme\">Problème<\u002Fbutton>\n      <button data-val=\"produit\">Produit<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tw-group\">\n    <label class=\"tw-label\">Accent<\u002Flabel>\n    <div class=\"tw-seg\" data-tweak=\"accent\">\n      <button data-val=\"violet\">Violet<\u002Fbutton>\n      <button data-val=\"cyan\">Bleu<\u002Fbutton>\n      <button data-val=\"navy\">Navy<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tw-group\">\n    <label class=\"tw-label\">Densité<\u002Flabel>\n    <div class=\"tw-seg\" data-tweak=\"density\">\n      <button data-val=\"dense\">Dense<\u002Fbutton>\n      <button data-val=\"normal\">Normal<\u002Fbutton>\n      <button data-val=\"airy\">Aéré<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tw-group\">\n    <label class=\"tw-label\">Sparkles<\u002Flabel>\n    <div class=\"tw-seg\" data-tweak=\"sparkles\">\n      <button data-val=\"on\">On<\u002Fbutton>\n      <button data-val=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* Auto-wrap buttons - disabled (reference landing uses simple solid buttons, no crop frames). */\n/* (function wrapButtons() {})(); */\n\n/* ===== Nav scroll state ===== */\nconst nav = document.getElementById('nav');\nwindow.addEventListener('scroll', () => {\n  nav.classList.toggle('scrolled', window.scrollY > 10);\n}, { passive: true });\n\n/* ===== Hero copy variants ===== */\nconst HERO_VARIANTS = {\n  promesse: {\n    h1: ['Modélisez ce qui fait', 'bouger vos chiffres.', '<span class=\"accent\">Décidez<\u002Fspan> plus vite.'],\n    sub: 'Testez n\\u2019importe quelle décision en direct. Eridan modélise les drivers de votre business et propage l\\u2019impact en temps réel : recrutement, pricing, churn. « Si je recrute un sales demain, quel impact sur mon runway\\u00a0? ». La réponse en dix secondes, pas en deux jours.'\n  },\n  probleme: {\n    h1: ['La finance devrait piloter', 'les <span class=\"accent\">décisions<\u002Fspan>. Pas les préparer.'],\n    sub: 'Trop d\\u2019équipes finance passent 80% de leur temps à consolider des fichiers. Eridan prend en charge la plomberie : sources, règles, drivers, scénarios. Votre équipe retrouve sa place : éclairer les choix qui comptent, en direct, pas deux jours plus tard.'\n  },\n  produit: {\n    h1: ['L\\u2019OS finance', '<span class=\"accent\">piloté<\u002Fspan> par l\\u2019IA.'],\n    sub: 'Importez vos sources, modélisez vos drivers, testez n\\u2019importe quel scénario en direct. Une seule source de vérité. Les mêmes droits partout. Dans l\\u2019app, dans Excel, ou via votre assistant IA.'\n  }\n};\n\nfunction applyHero(v) {\n  const variant = HERO_VARIANTS[v] || HERO_VARIANTS.promesse;\n  const h1 = document.getElementById('hero-h1');\n  h1.innerHTML = variant.h1.map(l => `<span class=\"line\">${l}<\u002Fspan>`).join('');\n  document.getElementById('hero-sub').textContent = variant.sub;\n}\n\n/* ===== Live demo typing loop ===== */\nconst DEMO_SEQUENCES = [\n  {\n    chips: ['Scénario · hire_2_ae_jan', 'Drivers · headcount, ramp, CAC'],\n    q: 'Si on recrute 2 AE en janvier, quel impact sur mon runway&nbsp;?',\n    a: 'Runway passe de 18 à 15 mois. Le break‑even glisse d\\'un trimestre (Q3 → Q4 2027). En contrepartie, si la ramp tient 80% du plan à M+6, l\\'ARR de sortie 2027 gagne €640k. Je te montre la comparaison&nbsp;?',\n    rowsLabel: 'Impact · baseline vs. scénario',\n    header: ['Driver', 'Baseline', 'Scénario'],\n    rows: [\n      ['Runway', '18 mo', '15 mo', 'down'],\n      ['Break‑even', 'Q3 2027', 'Q4 2027', 'down'],\n      ['ARR sortie 2027', '€4.2M', '€4.84M', 'up']\n    ]\n  },\n  {\n    chips: ['Scénario · pricing_+8%', 'Drivers · ARPU, churn, conversion'],\n    q: 'Et si on augmente les prix de 8% sur le segment mid‑market&nbsp;?',\n    a: 'Hypothèse : +8% ARPU, élasticité −0,6 sur la conversion, churn +0,4pt sur 6 mois. Net : ARR +€320k sur 12 mois, marge brute +1,9pt. Le risque est concentré sur les renouvellements Q2 (à surveiller).',\n    rowsLabel: 'Impact · pricing +8% mid‑market',\n    header: ['Métrique', '12 mois', 'Delta'],\n    rows: [\n      ['ARR net', '€4.52M', '+€320k', 'up'],\n      ['Marge brute', '72.1%', '+1.9pt', 'up'],\n      ['Churn attendu', '6.4%', '+0.4pt', 'down']\n    ]\n  },\n  {\n    chips: ['Scénario · churn_stress', 'Drivers · churn, NRR, cash'],\n    q: 'Quel est mon pire scénario si le churn monte de 2 points&nbsp;?',\n    a: 'Dans le stress‑test, ARR sortie 2027 cède €580k et NRR tombe à 102%. Runway reste au‑dessus de 12 mois tant que CAC se stabilise. Tu veux que je pin ce scénario à côté du baseline en comité&nbsp;?',\n    rowsLabel: 'Stress · churn +2pt',\n    header: ['Métrique', 'Baseline', 'Stress'],\n    rows: [\n      ['ARR sortie 2027', '€4.2M', '€3.62M', 'down'],\n      ['NRR', '112%', '102%', 'down'],\n      ['Runway', '18 mo', '13 mo', 'down']\n    ]\n  }\n];\n\nasync function typeTo(el, text, speed = 16) {\n  return new Promise(resolve => {\n    el.innerHTML = '';\n    let i = 0;\n    const caret = '<span class=\"caret\"><\u002Fspan>';\n    const iv = setInterval(() => {\n      i += 2;\n      if (i >= text.length) {\n        el.innerHTML = text;\n        clearInterval(iv);\n        resolve();\n      } else {\n        el.innerHTML = text.slice(0, i) + caret;\n      }\n    }, speed);\n  });\n}\n\nasync function runDemo() {\n  const userQ = document.getElementById('user-q');\n  const botA = document.getElementById('bot-a');\n  const chips = document.getElementById('bot-chips');\n  const result = document.getElementById('bot-result');\n  const resultBody = document.getElementById('result-body');\n  const resultHdr = document.querySelector('#bot-result .hdr span:first-child');\n  const resultThead = document.querySelector('#bot-result thead tr');\n  let idx = 0;\n  while (true) {\n    const seq = DEMO_SEQUENCES[idx % DEMO_SEQUENCES.length];\n    botA.innerHTML = '';\n    chips.style.display = 'none';\n    result.style.display = 'none';\n    resultBody.innerHTML = '';\n    // update chips\n    chips.innerHTML = seq.chips.map(c => `<span class=\"chip-mono\"><span class=\"dot\"><\u002Fspan>${c}<\u002Fspan>`).join('');\n    // update result header + thead\n    if (resultHdr) resultHdr.textContent = seq.rowsLabel || 'Résultat';\n    if (resultThead) resultThead.innerHTML = `<th>${seq.header[0]}<\u002Fth><th class=\"num\">${seq.header[1]}<\u002Fth><th class=\"num\">${seq.header[2]}<\u002Fth>`;\n    await typeTo(userQ, seq.q, 18);\n    await new Promise(r => setTimeout(r, 420));\n    chips.style.display = 'flex';\n    await new Promise(r => setTimeout(r, 220));\n    await typeTo(botA, seq.a, 14);\n    await new Promise(r => setTimeout(r, 260));\n    result.style.display = 'block';\n    for (const [name, baseline, val, dir] of seq.rows) {\n      const tr = document.createElement('tr');\n      tr.innerHTML = `<td class=\"primary\">${name}<\u002Ftd><td class=\"num\">${baseline}<\u002Ftd><td class=\"num\"><span class=\"delta ${dir}\">${val}<\u002Fspan><\u002Ftd>`;\n      tr.style.opacity = '0';\n      tr.style.transform = 'translateY(4px)';\n      tr.style.transition = 'opacity 200ms var(--ease-out), transform 200ms var(--ease-out)';\n      resultBody.appendChild(tr);\n      await new Promise(r => setTimeout(r, 90));\n      tr.style.opacity = '1';\n      tr.style.transform = 'translateY(0)';\n    }\n    await new Promise(r => setTimeout(r, 4400));\n    idx++;\n  }\n}\nrunDemo();\n\n/* ===== Tweaks ===== */\nconst tweaks = document.getElementById('tweaks');\n\nfunction refreshTweakButtons() {\n  document.querySelectorAll('.tw-seg').forEach(seg => {\n    const key = seg.dataset.tweak;\n    const cur = document.body.getAttribute('data-' + key);\n    seg.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.val === cur));\n  });\n}\n\ndocument.querySelectorAll('.tw-seg button').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const key = btn.parentElement.dataset.tweak;\n    const val = btn.dataset.val;\n    document.body.setAttribute('data-' + key, val);\n    if (key === 'hero') applyHero(val);\n    refreshTweakButtons();\n    // Persist\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');\n  });\n});\n\n// Apply initial hero from body attr\napplyHero(document.body.getAttribute('data-hero') || 'promesse');\nrefreshTweakButtons();\n\n/* ===== Edit mode host integration ===== */\nwindow.addEventListener('message', (e) => {\n  if (!e.data || typeof e.data !== 'object') return;\n  if (e.data.type === '__activate_edit_mode') tweaks.classList.add('visible');\n  if (e.data.type === '__deactivate_edit_mode') tweaks.classList.remove('visible');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
